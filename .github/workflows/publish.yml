name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      root_released: ${{ steps.release.outputs.release_created }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  publish-packs:
    needs: release-please
    if: ${{ needs.release-please.outputs.root_released == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate root package release
        run: pnpm release:root:check

      - name: Validate release packs
        run: pnpm release:packs:check

      - name: Publish @effective/icon
        run: npm publish --access public

      - name: Publish @icon-pkg/streamline-core-line-free
        working-directory: packages/packs/core-line-free
        run: npm publish --access public

      - name: Publish @icon-pkg/streamline-core-solid-free
        working-directory: packages/packs/core-solid-free
        run: npm publish --access public

      - name: Publish @icon-pkg/streamline-core-remix-free
        working-directory: packages/packs/core-remix-free
        run: npm publish --access public
